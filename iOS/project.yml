name: Depostrack
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Depostrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Depostrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depostrack
        DEVELOPMENT_TEAM: W7Q885Q59C
        INFOPLIST_FILE: Depostrack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
    info:
      path: Depostrack/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Depostrack
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Depostrack/Depostrack.entitlements
      properties: {}
  DepostrackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DepostrackTests
    dependencies:
      - target: Depostrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depostrack.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  DepostrackUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DepostrackUITests
    dependencies:
      - target: Depostrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depostrack.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Depostrack:
    build:
      targets:
        Depostrack: all
    test:
      targets:
        - DepostrackTests
        - DepostrackUITests
    run:
      config: Debug
